<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, sans-serif;
            line-height: 1.6;
            padding: 20px;
            color: #333;
            background-color: white;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #1a1a1a; font-size: 22px; }
        p { margin-bottom: 20px; }
        .box-esterno {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 30px;
        }
        .btn-link {
            display: inline-block;
            background: #007aff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Il sito internet del Canto Gregoriano</h1>

        <p><a href="https://www.gregorianum.org/" target="_blank">
                    https://www.gregorianum.org/</a></p>

    </div>
</body>
</html>
